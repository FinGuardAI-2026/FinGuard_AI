# FinGuard AI — Setup Configuration File
[flake8]
max-line-length = 120
max-complexity = 10
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    migrations,
    node_modules
ignore =
    # whitespace before ':'
    E203,
    # line break before binary operator
    W503,
    # too complex
    C901
per-file-ignores =
    # Allow unused imports in __init__.py files
    __init__.py:F401

[tool:pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
