name: FinGuard AI — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

# ────────────────────────────────────────────────────────────────────
# JOB 1: Backend — Lint + Format + Unit Tests
# ────────────────────────────────────────────────────────────────────
jobs:
  backend-ci:
    name: "Backend — Lint & Unit Tests"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-asyncio anyio httpx
          pip install -r requirements.txt

      # ── Linting ──────────────────────────────────────────────────
      - name: Flake8 — syntax errors and undefined names
        run: |
          flake8 app --count --select=E9,F63,F7,F82 \
            --show-source --statistics

      - name: Flake8 — style warnings (non-blocking)
        run: |
          flake8 app --count --exit-zero \
            --max-complexity=10 --max-line-length=120 \
            --statistics

      # ── Unit Tests ───────────────────────────────────────────────
      - name: Run Pytest — prediction unit tests
        env:
          ENVIRONMENT: testing
          SECRET_KEY: ci-test-secret-key-32chars-xxxxxxxx
          DEBUG: "false"
        run: |
          pytest tests/test_prediction.py -v \
            --tb=short \
            --no-header \
            -q

      # ── Coverage Report ──────────────────────────────────────────
      - name: Generate coverage report
        env:
          ENVIRONMENT: testing
          SECRET_KEY: ci-test-secret-key-32chars-xxxxxxxx
        run: |
          pip install pytest-cov -q
          pytest tests/test_prediction.py \
            --cov=app/schemas --cov=app/services \
            --cov-report=xml --cov-report=term-missing \
            -q
        continue-on-error: true

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage.xml
        if: always()

# ────────────────────────────────────────────────────────────────────
# JOB 2: Frontend — Lint + Build Verification
# ────────────────────────────────────────────────────────────────────
  frontend-ci:
    name: "Frontend — Lint & Build"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Vite production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

# ────────────────────────────────────────────────────────────────────
# JOB 3: Docker — Build images (runs after CI jobs pass)
# ────────────────────────────────────────────────────────────────────
  docker-build:
    name: "Docker — Build Image Verification"
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: finguard-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: finguard-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
